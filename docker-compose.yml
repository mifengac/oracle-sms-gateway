services:
  oracle-sms-gateway:
    image: oracle-sms-gateway:latest
    pull_policy: never
    container_name: oracle-sms-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ORACLE_CLIENT_LIB_DIR: /opt/oracle/instantclient_11_2
      LD_LIBRARY_PATH: /opt/oracle/instantclient_11_2
    ports:
      - "5011:18080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18080/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
